# This file contains common pin mappings for the BIGTREETECH Manta E3EZ
# To use this config, the firmware should be compiled for the
# STM32G0B1 with a "8KiB bootloader" "8 MHz crystal"
# and "USB (on PA11/PA12)" or "CAN bus (on PB12/PB13)".

# See docs/Config_Reference.md for a description of parameters.
[include mainsail.cfg]
[include ebb.cfg]
[include macros.cfg]

[gcode_arcs]

[exclude_object]


[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_1D00500012504D5930313820-if00

[printer]
kinematics: cartesian
max_velocity: 500
max_accel: 3600
max_z_velocity: 5
max_z_accel: 100

[stepper_x]
step_pin: PA14
dir_pin: !PA10
enable_pin: !PA13
microsteps: 16
rotation_distance: 32
endstop_pin: tmc2209_stepper_x:virtual_endstop
position_endstop: -14
position_min: -14
position_max: 235
homing_speed: 60
homing_retract_dist: 0
full_steps_per_rotation: 400

[stepper_y]
step_pin: PC8
dir_pin: !PA15
enable_pin: !PC14
microsteps: 16
rotation_distance: 32
endstop_pin: tmc2209_stepper_y:virtual_endstop
position_endstop: -22
position_min: -22
position_max: 235
homing_speed: 60
homing_retract_dist: 0
full_steps_per_rotation: 400

[stepper_z]
step_pin: PD2
dir_pin: !PD4
enable_pin: !PD3
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
position_max: 250

[stepper_z1]
step_pin: PD5
dir_pin: !PD6
enable_pin: !PB3
microsteps: 16
microsteps: 16
rotation_distance: 8


